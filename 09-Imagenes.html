<!-- Imagenes -->
<!-- Imagen básica -->
<img src="foto.jpg" alt="Descripción de la imagen" />

<!-- Imagen con tamaño -->
<img src="logo.png" alt="Logo de la empresa" width="200" height="100" />

<!-- Imagen responsiva con figure -->
<figure>
    <img src="paisaje.jpg" alt="Paisaje al atardecer" />
    <figcaption>Atardecer en la playa, 2024.</figcaption>
</figure>

<!-- Imagen como enlace -->
<a href="https://ejemplo.com">
    <img src="banner.jpg" alt="Ver más en ejemplo.com" />
</a>

<!-- El atributo alt es obligatorio. Es lo que leen los lectores de pantalla para personas con discapacidad visual, y también lo que muestra el navegador si la imagen no carga. -->
