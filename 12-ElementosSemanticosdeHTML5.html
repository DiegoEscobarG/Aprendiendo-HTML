<!-- Elementos Semánticos de HTML5 -->
<!-- Los elementos semánticos describen el propósito del contenido. Ayudan al SEO y a la accesibilidad. -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Página semántica</title>
</head>
<body>

    <header>
        <nav>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <article>
            <h1>Título del artículo</h1>
            <p>Contenido principal del artículo...</p>

            <section>
                <h2>Primera sección</h2>
                <p>Contenido de la sección...</p>
            </section>

            <section>
                <h2>Segunda sección</h2>
                <p>Más contenido...</p>
            </section>
        </article>

        <aside>
            <h3>Artículos relacionados</h3>
            <ul>
                <li><a href="#">Artículo 1</a></li>
                <li><a href="#">Artículo 2</a></li>
            </ul>
        </aside>
    </main>

    <footer>
        <p>&copy; 2024 Mi Sitio Web. Todos los derechos reservados.</p>
    </footer>

</body>
</html>

<!-- Elementos semánticos clave:

- <header> — encabezado de la página o sección
- <nav> — menú de navegación
- <main> — contenido principal (solo uno por página)
- <article> — contenido independiente y reutilizable
- <section> — sección temática de contenido
- <aside> — contenido relacionado pero secundario (sidebar)
- <footer> — pie de página -->
