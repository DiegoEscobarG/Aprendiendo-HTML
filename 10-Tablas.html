<!-- Tablas -->
<table>
    <thead>
        <tr>
            <th>Nombre</th>
            <th>Edad</th>
            <th>País</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>Ana</td>
            <td>28</td>
            <td>México</td>
        </tr>
        <tr>
            <td>Luis</td>
            <td>32</td>
            <td>Colombia</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="3">Total: 2 personas</td>
        </tr>
    </tfoot>
</table>

<!-- Estructura de una tabla:

- <table> — contenedor principal
- <thead> — encabezado de la tabla
- <tbody> — cuerpo con los datos
- <tfoot> — pie de la tabla
- <tr> — fila (table row)
- <th> — celda de encabezado (table header)
- <td> — celda de datos (table data)
- colspan — cuántas columnas ocupa una celda -->
