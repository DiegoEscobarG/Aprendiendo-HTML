<!-- Estructura básica de un documento HTML -->
<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mi primera página</title>
    </head>
    <body>
        <h1>Hola, mundo</h1>
        <p>Esta es mi primera página web.</p>
    </body>
</html>

<!-- Línea por línea:

- <!DOCTYPE html>        — le dice al navegador que este es un documento HTML5.
- <html lang="es">       — elemento raíz de toda la página.
- <head>                 — información del documento que el usuario no ve directamente (metadatos, título, links a CSS).
- <meta charset="UTF-8"> — permite usar tildes y caracteres especiales.
- <meta name="viewport"> — hace que la página sea responsiva en móviles.
- <title>                — el texto que aparece en la pestaña del navegador.
- <body>                 — todo lo que el usuario ve en pantalla va aquí. -->
