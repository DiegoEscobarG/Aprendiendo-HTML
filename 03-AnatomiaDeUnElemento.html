<!-- Anatomía de un elemento HTML

<etiqueta atributo="valor">Contenido</etiqueta>

    Ejemplo real -->
<a href="https://google.com" target="_blank">Ir a Google</a>

<!-- Elemento vacío (no tiene cierre) -->
<img src="foto.jpg" alt="Mi foto" />
<br />
<hr />
<input type="text" />
<!-- 
- **Etiqueta de apertura:** `<a>`
- **Atributos:** información extra del elemento (`href`, `target`)
- **Contenido:** lo que aparece en pantalla
- **Etiqueta de cierre:** `</a>`
- **Elementos vacíos:** no tienen contenido ni etiqueta de cierre
-->
