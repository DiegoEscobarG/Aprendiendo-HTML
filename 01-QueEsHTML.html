<!-- 
    ¿Qué es HTML?

    HTML es el lenguaje de marcado que define la **estructura** de una página web. No es un lenguaje de programación — no tiene lógica, condiciones ni variables. Su trabajo es decirle al navegador qué tipo de contenido hay en la página: un título, un párrafo, una imagen, un botón, un formulario.

    Piensa en HTML como el esqueleto de una casa. CSS sería la pintura y decoración, y JavaScript el sistema eléctrico.
-->
