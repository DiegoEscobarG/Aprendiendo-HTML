<!-- Formularios -->
<form action="/enviar" method="POST">

    <!-- Campo de texto -->
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required />

    <!-- Email -->
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required />

    <!-- Contraseña -->
    <label for="pass">Contraseña:</label>
    <input type="password" id="pass" name="password" minlength="8" />

    <!-- Número -->
    <label for="edad">Edad:</label>
    <input type="number" id="edad" name="edad" min="1" max="120" />

    <!-- Área de texto -->
    <label for="mensaje">Mensaje:</label>
    <textarea id="mensaje" name="mensaje" rows="4" cols="40"></textarea>

    <!-- Select (lista desplegable) -->
    <label for="pais">País:</label>
    <select id="pais" name="pais">
        <option value="">-- Selecciona --</option>
        <option value="mx">México</option>
        <option value="co">Colombia</option>
        <option value="ar">Argentina</option>
    </select>

    <!-- Radio buttons -->
    <p>Género:</p>
    <input type="radio" id="m" name="genero" value="masculino" />
    <label for="m">Masculino</label>
    <input type="radio" id="f" name="genero" value="femenino" />
    <label for="f">Femenino</label>

    <!-- Checkbox -->
    <input type="checkbox" id="terminos" name="terminos" />
    <label for="terminos">Acepto los términos y condiciones</label>

    <!-- Botones -->
    <button type="submit">Enviar</button>
    <button type="reset">Limpiar</button>

</form>

<!-- Siempre vincula <label> con <input> usando for e id iguales. Esto mejora la accesibilidad y permite hacer clic en el label para enfocar el input -->
